# Secrets for Anomaly Detector (base64 encoded)
# Note: In production, use sealed secrets or external secret management
apiVersion: v1
kind: Secret
metadata:
  name: anomaly-detector-secrets
  namespace: banking-services
type: Opaque
data:
  # Database credentials (base64 encoded)
  # echo -n 'postgres' | base64
  DB_USER: cG9zdGdyZXM=
  # echo -n 'your-secure-password' | base64  
  DB_PASSWORD: eW91ci1zZWN1cmUtcGFzc3dvcmQ=
  
  # API Keys (if needed)
  # echo -n 'your-api-key' | base64
  API_KEY: eW91ci1hcGkta2V5
  
  # Encryption keys for data at rest
  # echo -n 'your-encryption-key' | base64
  ENCRYPTION_KEY: eW91ci1lbmNyeXB0aW9uLWtleQ==

