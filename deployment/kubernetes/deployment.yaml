# Kubernetes Deployment for Anomaly Detection Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: banking-services
  labels:
    app: anomaly-detector
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: anomaly-detector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: anomaly-detector
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: anomaly-detector
      containers:
      - name: anomaly-detector
        image: anomaly-detector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: RANDOM_SEED
          value: "42"
        - name: TF_CPP_MIN_LOG_LEVEL
          value: "2"
        - name: MODELS_DIR
          value: "/app/models"
        envFrom:
        - configMapRef:
            name: anomaly-detector-config
        - secretRef:
            name: anomaly-detector-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: tmp
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
# Persistent Volume Claim for Models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: banking-services
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

