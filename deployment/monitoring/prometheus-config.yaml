# Prometheus Configuration for Anomaly Detection System (Docker Compose)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'kenyan-banking-local'
    environment: 'development'

scrape_configs:
  - job_name: 'anomaly-detector'
    static_configs:
      - targets: ['anomaly-detector:5000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
